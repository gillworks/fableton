<!doctype html>
<!-- SPDX-License-Identifier: Apache-2.0 -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fableton</title>
    <!-- Social cards: the {{env "..."}} placeholders are rendered by caddy's
         templates directive at serve time (deploy/Caddyfile) — OG data is
         WORLD data, so it cannot be baked into the shared client build. In
         vite dev these render literally; crawlers only see deployed output. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content='{{env "OG_TITLE"}}' />
    <meta property="og:description" content='{{env "OG_DESC"}}' />
    <meta property="og:url" content='{{env "PUBLIC_URL"}}' />
    <meta property="og:image" content='{{env "PUBLIC_URL"}}{{env "OG_IMAGE_PATH"}}' />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content='{{env "OG_TITLE"}}' />
    <meta name="twitter:description" content='{{env "OG_DESC"}}' />
    <meta name="twitter:image" content='{{env "PUBLIC_URL"}}{{env "OG_IMAGE_PATH"}}' />
    <link rel="stylesheet" href="/assets/fonts/fonts.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
