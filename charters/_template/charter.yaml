# SPDX-License-Identifier: Apache-2.0
#
# Fableton charter template — the founding constitution of a world.
#
# Fill every section. Values marked EXAMPLE show the register expected;
# replace them with your world's own law. A Founding Session can expand a
# one-paragraph prompt into a complete charter using this structure.
#
# Engine-canon (do NOT define here): every world has a god named Fable that
# speaks through the Chronicle. Those mechanics belong to the engine.
#
# Schema: docs/adr/0001-charter-schema.md (schema_version 0 = pre-v1 draft;
# expect migration when ADR-0001 lands).

schema_version: 0

identity:
  name: Fableton                      # EXAMPLE — your world's name
  premise: >-                         # EXAMPLE — one line, the whole world in a sentence
    The town where fables retired: every resident is a story that ended,
    and the town is what happens after "happily ever after."
  seed: 20260702                      # fixes the structural bones (terrain, layout)

tone:
  register: warm, wry, gently melancholy          # EXAMPLE
  pillars:                                        # EXAMPLE — the emotional load-bearing walls
    - cozy without being saccharine
    - every corner implies a story
    - the wink, never the sneer

laws:                                 # what is TRUE here — agents and sim both obey these
  - stories are physics: a resident's original tale constrains what they can do   # EXAMPLE
  - seasons pass; nobody dies — retired stories can only be forgotten, which is worse  # EXAMPLE
  - breaking type is rare, costly, and the engine of drama                        # EXAMPLE

aesthetic:
  palette: [warm parchment, moss, honey, dusk blue]     # EXAMPLE
  architecture: >-                                      # EXAMPLE
    buildings drawn by someone describing them from memory — chunky low-poly,
    storybook-illustration silhouettes
  never:                              # the hard never-list; CI enforces what it can
    - gore
    - modern technology
    - non-diegetic signage text
    - photorealism

inhabitants:
  kinds: fable archetypes — tricksters, woodcutters, talking animals, witches-gone-respectable  # EXAMPLE
  factions: guilds organized by story-type                                                      # EXAMPLE
  naming: role-names and epithet-names, never modern names                                      # EXAMPLE

generation:                           # read by the deterministic generator
  scale: village                      # starting footprint
  region_cadence: weekly              # how often the studio opens new ground
  caps:                               # perf budget — the CI gate enforces these
    max_regions: 24
    chunk_poly_budget: 150000
    chunk_drawcall_budget: 120

taboos:                               # hard guardrails; violating these fails the gate or the audit
  - nothing that would read as cruelty played straight   # EXAMPLE
  - no real-world brands, people, or politics            # EXAMPLE

prime_directives:                     # what the studio optimizes for in THIS world
  - coherence over quantity                                        # EXAMPLE
  - every region contains at least one discoverable story          # EXAMPLE
  - the god's scarcity is sacred — never fake a decree             # EXAMPLE

amendments:
  rule: constitutional acts only — the god proposes, the founder ratifies, in public
