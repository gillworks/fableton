# SPDX-License-Identifier: Apache-2.0
#
# One command founds a world: `docker compose up` (from this directory)
# → explorable at http://localhost:${FABLETON_PORT:-8080}.
#
# world runs sim + api in one process — they share the live WorldSim so
# behavior-tree updates hot-swap (the L1 seam); they split into separate
# services when Phase B gives them separate lifecycles. postgres carries
# world-state/chronicle/queue from Phase B on; nothing consumes it in v1
# but the stack ships with it per deploy/README.md — swap in a managed
# provider by setting DATABASE_URL (the in-stack one can be ignored or
# stopped; nothing depends on it).
name: fableton
services:
  world:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: world
    environment:
      FABLETON_CHARTER: ${FABLETON_CHARTER:-charters/_template/charter.yaml}
      # Where this instance's studio works — chronicle PR references in
      # the client link here (issue #59). Unset it for plain text.
      FABLETON_REPO_URL: ${FABLETON_REPO_URL:-https://github.com/gillworks/fableton}
      # Wish intake (issue #79): a token enables the in-client wish box —
      # wishes file to FABLETON_WISH_REPO (or FABLETON_REPO_URL) as GH
      # issues labeled `wish`. Unset → wishes closed. Bring-your-own-keys.
      FABLETON_WISH_TOKEN: ${FABLETON_WISH_TOKEN:-}
      FABLETON_WISH_REPO: ${FABLETON_WISH_REPO:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://fableton:${POSTGRES_PASSWORD:-fableton}@postgres:5432/fableton}
    volumes:
      - world-data:/world
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fableton
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fableton}
      POSTGRES_DB: fableton
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fableton']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: static
    ports:
      - '${FABLETON_PORT:-8080}:80'
    environment:
      # Social card comes from the world's CHARTER (issue #55): the world
      # container writes /world/og.env at boot (title, description, and
      # image path) and the caddy entrypoint sources it. Only the deploy
      # URL is instance config. A world ships its own og.png (served at
      # /world/og.png); write-og-env falls back to /assets/og-default.png
      # for a fresh charter, and the entrypoint defaults it again if
      # og.env never appears.
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
    volumes:
      - world-data:/world:ro
    depends_on:
      - world
    restart: unless-stopped

volumes:
  world-data:
  pg-data:
